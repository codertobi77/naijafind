<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f4f6"/>
      <stop offset="100%" style="stop-color:#e5e7eb"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="80" fill="#10b981" opacity="0.1"/>
  <circle cx="350" cy="250" r="100" fill="#059669" opacity="0.1"/>
  
  <!-- Icon background circle -->
  <circle cx="200" cy="130" r="60" fill="url(#iconBg)"/>
  
  <!-- Store/Building icon -->
  <g fill="white" transform="translate(170, 100)">
    <!-- Building -->
    <rect x="15" y="20" width="30" height="35" rx="2"/>
    <!-- Roof -->
    <path d="M10 20 L30 5 L50 20 Z"/>
    <!-- Door -->
    <rect x="22" y="40" width="8" height="15" rx="1"/>
    <!-- Window -->
    <rect x="32" y="28" width="8" height="8" rx="1"/>
    <rect x="18" y="28" width="8" height="8" rx="1"/>
    <!-- Awning -->
    <rect x="8" y="18" width="44" height="6" rx="2"/>
    <!-- Stripes on awning -->
    <rect x="12" y="18" width="4" height="6" fill="#10b981"/>
    <rect x="20" y="18" width="4" height="6" fill="#10b981"/>
    <rect x="28" y="18" width="4" height="6" fill="#10b981"/>
    <rect x="36" y="18" width="4" height="6" fill="#10b981"/>
    <rect x="44" y="18" width="4" height="6" fill="#10b981"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#374151">
    Pas d'image disponible
  </text>
  <text x="200" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6b7280">
    Fournisseur
  </text>
</svg>
