name: Deploy to Hostinger VPS (Docker)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_CLOUDINARY_CLOUD_NAME: ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
        run: |
          docker build \
            --build-arg VITE_CONVEX_URL="$VITE_CONVEX_URL" \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="$VITE_CLERK_PUBLISHABLE_KEY" \
            --build-arg VITE_STRIPE_PUBLISHABLE_KEY="$VITE_STRIPE_PUBLISHABLE_KEY" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="$VITE_GOOGLE_MAPS_API_KEY" \
            --build-arg VITE_MAPBOX_TOKEN="$VITE_MAPBOX_TOKEN" \
            --build-arg VITE_SUPABASE_URL="$VITE_SUPABASE_URL" \
            --build-arg VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" \
            --build-arg VITE_FIREBASE_API_KEY="$VITE_FIREBASE_API_KEY" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="$VITE_FIREBASE_AUTH_DOMAIN" \
            --build-arg VITE_FIREBASE_PROJECT_ID="$VITE_FIREBASE_PROJECT_ID" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="$VITE_FIREBASE_STORAGE_BUCKET" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="$VITE_FIREBASE_MESSAGING_SENDER_ID" \
            --build-arg VITE_FIREBASE_APP_ID="$VITE_FIREBASE_APP_ID" \
            --build-arg VITE_CLOUDINARY_CLOUD_NAME="$VITE_CLOUDINARY_CLOUD_NAME" \
            -t naijafind:latest .

      - name: Save Docker image
        run: |
          docker save naijafind:latest | gzip > naijafind-image.tar.gz
          ls -lh naijafind-image.tar.gz

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          log-public-key: false

      - name: Verify secrets and configure SSH
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "❌ Erreur: VPS_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "❌ Erreur: VPS_USER secret is not set"
            exit 1
          fi
          
          echo "✓ Secrets verified"
          
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts
          echo "✓ SSH configuration completed"

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/var/www/naijafind' }}
        run: |
          echo "Deploying Docker image to $VPS_HOST..."

          # Create deployment directory
          ssh -p $VPS_SSH_PORT $VPS_USER@$VPS_HOST "mkdir -p $DEPLOY_PATH"

          # Copy Docker image to VPS
          echo "Copying Docker image..."
          scp -P $VPS_SSH_PORT naijafind-image.tar.gz $VPS_USER@$VPS_HOST:$DEPLOY_PATH/

          # Copy docker-compose.yml
          scp -P $VPS_SSH_PORT docker-compose.yml $VPS_USER@$VPS_HOST:$DEPLOY_PATH/

          echo "✓ Files copied successfully"

      - name: Start application on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/var/www/naijafind' }}
          APP_PORT: ${{ secrets.APP_PORT || '3000' }}
        run: |
          echo "Starting application on VPS..."

          ssh -p $VPS_SSH_PORT $VPS_USER@$VPS_HOST << EOF
            cd $DEPLOY_PATH

            # Load the Docker image
            echo "Loading Docker image..."
            gunzip -c naijafind-image.tar.gz | docker load

            # Stop and remove old container if exists
            echo "Stopping old container..."
            docker compose down 2>/dev/null || docker-compose down 2>/dev/null || true

            # Remove old images to save space
            docker image prune -f 2>/dev/null || true

            # Start the application
            echo "Starting application..."
            export APP_PORT=$APP_PORT
            docker compose up -d

            # Verify container is running
            sleep 5
            if docker ps | grep -q naijafind-app; then
              echo "✓ Container is running"
            else
              echo "❌ Container failed to start"
              docker logs naijafind-app 2>&1 || true
              exit 1
            fi

            echo "✓ Deployment completed successfully!"
          EOF

      - name: Verify deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          APP_PORT: ${{ secrets.APP_PORT || '3000' }}
        run: |
          echo "Verifying deployment..."
          sleep 10
          curl -sSf --max-time 30 http://$VPS_HOST:$APP_PORT > /dev/null && echo "✓ App is running on port $APP_PORT" || echo "⚠️ Could not verify app status"
